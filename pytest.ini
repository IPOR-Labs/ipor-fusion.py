[pytest]
log_cli = true
log_cli_level = INFO
addopts = --cov=src/ipor_fusion --cov-report=term-missing --cov-report=xml:coverage.xml
testpaths = tests
markers =
    sdk: SDK core and fuse tests (may require Docker/Anvil)
    cli: CLI unit tests (no network required)
    mcp: MCP server tests (no network required)