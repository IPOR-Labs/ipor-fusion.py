name: Python publish

on:
  workflow_call:

    secrets:
      ARBITRUM_PROVIDER_URL:
        required: true
      BASE_PROVIDER_URL:
        required: true
      ETHEREUM_PROVIDER_URL:
        required: true
      GH_TOKEN:
        required: true
      SSH_SIGN_KEY_PRIVATE:
        required: true
      SSH_SIGN_KEY_PUBLIC:
        required: true

    inputs:
      python-version:
        description: "Python version"
        type: string
        default: 3.12
        required: false
      poetry-version:
        description: "Poetry version"
        type: string
        default: 1.8
        required: false
      test-options:
        description: "Extra pytest options"
        type: string
        default: "-v -s"
        required: false
      format-code-enabled:
        description: "Enable code formatting"
        type: boolean
        default: true
        required: false
      static-code-analysis-enabled:
        description: "Enable static code analysis"
        type: boolean
        default: true
        required: false
      build-enabled:
        description: "Enable package build"
        type: boolean
        default: true
        required: false
      test-enabled:
        description: "Enable pytest tests"
        type: boolean
        default: true
        required: false
      publish-enabled:
        description: "Enable package publishing"
        type: boolean
        default: false
        required: false
      force-semver-part:
        description: "SemVer part to increase (empty: auto)"
        type: string
        default: ""
        required: false

env:
  POETRY_VIRTUALENVS_PATH: "~/.cache/pypoetry/virtualenvs"

jobs:
  python:
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/ipor-fusion
    permissions:
      attestations: write
      checks: read
      contents: write
      deployments: write
      id-token: write
      packages: write
      statuses: read

    steps:
      - name: Checkout
        # from tag: v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up branch
        run: |
          git checkout -B ${{ github.ref_name }} ${{ github.sha }}

      - name: Set up Python
        # from tag: v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Poetry
        # from tag: v4.0.0
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: ${{ inputs.poetry-version }}

      - name: Cache
        # from tag: v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ env.POETRY_VIRTUALENVS_PATH }}
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

      - name: Install
        run: poetry install
        id: install

      - name: Build
        if: inputs.build-enabled
        run: poetry build
        id: build

      - name: Tests
        if: inputs.test-enabled
        run: |
          poetry run pytest ${{ inputs.test-options }}
        env:
          ETHEREUM_PROVIDER_URL: ${{ secrets.ETHEREUM_PROVIDER_URL }}
          ARBITRUM_PROVIDER_URL: ${{ secrets.ARBITRUM_PROVIDER_URL }}
          BASE_PROVIDER_URL: ${{ secrets.BASE_PROVIDER_URL }}
        id: tests

      - name: Format code
        if: inputs.format-code-enabled
        run: poetry run black --check ./
        id: format-code

      - name: Static code analysis
        if: inputs.static-code-analysis-enabled
        run: poetry run pylint --rcfile=pylintrc.toml --verbose --recursive=y .
        id: static-code-analyze

      - name: Version release
        if: inputs.publish-enabled
        id: release
        # from tag: v10.5.3
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          git_committer_name: "bob-the-builder-ipor"
          git_committer_email: "106537082+bob-the-builder-ipor@users.noreply.github.com"
          ssh_public_signing_key: ${{ secrets.SSH_SIGN_KEY_PUBLIC }}
          ssh_private_signing_key: ${{ secrets.SSH_SIGN_KEY_PRIVATE }}
          build: true
          commit: true
          changelog: true
          tag: true
          push: true
          vcs_release: true
          force: ${{ inputs.force-semver-part }}

      - name: Publish GitHub release
        # from tag: v10.5.3
        uses: python-semantic-release/publish-action@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0
        if: inputs.publish-enabled && steps.release.outputs.released
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Publish PyPI
        if: inputs.publish-enabled && steps.release.outputs.released
        # from tag: v1.14.0
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          print-hash: true
          verify-metadata: true
        id: publish
