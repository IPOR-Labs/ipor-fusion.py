name: Python build

on:
  workflow_call:

    secrets:
      ARBITRUM_PROVIDER_URL:
        required: true
      BASE_PROVIDER_URL:
        required: true
      ETHEREUM_PROVIDER_URL:
        required: true

    inputs:
      python-version:
        description: "Python version"
        type: string
        default: 3.12
        required: false
      poetry-version:
        description: "Poetry version"
        type: string
        default: 1.8
        required: false
      test-options:
        description: "Extra pytest options"
        type: string
        default: "-v -s"
        required: false
      format-code-enabled:
        description: "Enable code formatting"
        type: boolean
        default: true
        required: false
      static-code-analysis-enabled:
        description: "Enable static code analysis"
        type: boolean
        default: true
        required: false
      build-enabled:
        description: "Enable package build"
        type: boolean
        default: true
        required: false
      test-enabled:
        description: "Enable pytest tests"
        type: boolean
        default: true
        required: false

env:
  POETRY_VIRTUALENVS_PATH: "~/.cache/pypoetry/virtualenvs"

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        # from tag: v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          submodules: recursive

      - name: Set up Python
        # from tag: v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up Poetry
        # from tag: v4.0.0
        uses: abatilo/actions-poetry@3765cf608f2d4a72178a9fc5b918668e542b89b1
        with:
          poetry-version: ${{ inputs.poetry-version }}

      - name: Cache
        # from tag: v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ${{ env.POETRY_VIRTUALENVS_PATH }}
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

      - name: Install
        run: poetry install --all-extras
        id: install

      - name: Format code
        if: inputs.format-code-enabled
        run: poetry run black --check ./
        id: format-code

      - name: Static code analysis
        if: inputs.static-code-analysis-enabled
        run: poetry run pylint --rcfile=pylintrc.toml --verbose --recursive=y .
        id: static-code-analyze

      - name: Type check
        if: inputs.static-code-analysis-enabled
        run: poetry run mypy .
        id: type-check

      - name: Build
        if: inputs.build-enabled
        run: poetry build
        id: build

      - name: Tests
        if: inputs.test-enabled
        run: |
          poetry run pytest ${{ inputs.test-options }}
        env:
          ETHEREUM_PROVIDER_URL: ${{ secrets.ETHEREUM_PROVIDER_URL }}
          ARBITRUM_PROVIDER_URL: ${{ secrets.ARBITRUM_PROVIDER_URL }}
          BASE_PROVIDER_URL: ${{ secrets.BASE_PROVIDER_URL }}
        id: tests

      - name: Coverage summary
        if: inputs.test-enabled && always() && steps.tests.outcome != 'skipped'
        run: |
          poetry run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        if: inputs.test-enabled && always() && steps.tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

